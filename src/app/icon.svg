<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#EFE4C5"/>
  <!-- Gold leaf in oval frame - matching brand logo -->
  <g transform="translate(16, 12)">
    <!-- Oval frame -->
    <ellipse cx="0" cy="1" rx="7" ry="9" fill="none" stroke="#BCA480" stroke-width="0.8"/>
    <!-- Center leaf -->
    <ellipse cx="0" cy="-1" rx="2" ry="6" fill="#606C38" opacity="0.9"/>
    <!-- Left leaf -->
    <ellipse cx="-3" cy="1" rx="1.5" ry="4.5" fill="#606C38" opacity="0.7" transform="rotate(-20 -3 1)"/>
    <!-- Right leaf -->
    <ellipse cx="3" cy="1" rx="1.5" ry="4.5" fill="#606C38" opacity="0.7" transform="rotate(20 3 1)"/>
    <!-- Small gold diamond accent -->
    <polygon points="0,-8 1,-7 0,-6 -1,-7" fill="#BCA480"/>
  </g>
  <text x="16" y="27.5" text-anchor="middle" font-family="Georgia, serif" font-size="6.5" fill="#2B4C3F" letter-spacing="0.4" font-weight="400">jaison</text>
</svg>
